<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - HephAuto</title>
  <link rel="stylesheet" href="Heph.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: #f7f9fa;
      color: #222;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
    }
    .messages-container {
      min-height: 100vh;
      background: #f7f9fa;
      padding-top: 0;
      padding-bottom: 90px;
    }
    .messages-content {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 0 0 0;
    }

    @media (min-width: 601px) {
      .messages-container {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        max-width: 420px;
        border-radius: 8px ;
        margin: 32px 32px 0 auto;
        height: 70vh;
      }
      .messages-content {
        margin: 0 0 0 auto;
      }
    }
    .messages-list {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      padding: 0 0 10px 0;
      background: #f7f9fa;
      min-height: 200px;
      max-height: 65vh;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    @media (min-width: 601px) {
      .messages-content {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }
      .messages-list {
        align-items: flex-start;
        justify-content: flex-start;
      }
    }
    .wa-bubble {
      display: block;
      max-width: 75%;
      margin: 2px 0 2px 0;
      padding: 10px 16px;
      border-radius: 18px 18px 4px 18px;
      font-size: 15px;
      color: #222;
      word-break: break-word;
      position: relative;
      transition: background 0.2s;
      clear: both;
      background: #232d25;
    }
    .wa-bubble.sent {
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      color: #fff;
      align-self: flex-end;
      border-radius: 18px 18px 18px 4px;
      margin-left: auto;
      margin-right: 0;
    }
    .wa-bubble.received {
      background: #fff;
      color: #222;
      align-self: flex-start;
      border-radius: 18px 18px 4px 18px;
      margin-right: auto;
      margin-left: 0;
    }
    .wa-bubble-warning {
      background: #181c1f;
      color: #fff;
      border: 1.5px solid #ff9800;
      border-radius: 18px;
      padding: 10px 18px;
      font-size: 1.01rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(255,152,0,0.08);
      align-self: flex-start;
      max-width: 90%;
    }
    .wa-bubble-warning i {
      color: #ff9800;
      font-size: 1.2em;
    }
    .wa-bubble-time {
      display: block;
      font-size: 14px;
      color: #ffffff;
      font-weight: 600;
      margin-top: 4px;
      text-align: right;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .wa-bubble-content {
      display: block;
      white-space: pre-line;
    }
    .wa-bubble-content.single-line {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .chat-input-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: #181c1f;
      padding: 10px 8px 10px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.10);
      max-width: 100vw;
    }
    .chat-input-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 20px;
      border: none;
      font-size: 1.08rem;
      background: #222;
      color: #111;
      outline: none;
    }
    .chat-input-bar button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      transition: background 0.2s;
    }
    .chat-input-bar button:active {
      background: #222;
    }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(90deg, #fff 60%, #ffecd2 100%, #ff6b35 180%);
      padding: 14px 16px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .chat-header .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .chat-header .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-header .chat-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-header .chat-title {
      font-weight: 600;
      font-size: 1.1rem;
      color: #222;
    }
    .chat-header .chat-status {
      font-size: 0.95rem;
      color: #888;
    }
    .chat-header .chat-actions {
      display: flex;
      gap: 16px;
      color: #888;
      font-size: 1.2rem;
    }
    .chat-product {
      background: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid #222;
    }
    .chat-product img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
    }
    .chat-product .product-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-product .product-title {
      font-size: 1rem;
      color: #222;
      font-weight: 500;
    }
    .chat-product .product-price {
      font-size: 0.98rem;
      color: #888;
    }
    .chat-body {
      background: #111;
      min-height: 60vh;
      padding: 18px 8px 90px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }
    .chat-warning {
      align-self: flex-start;
      background: #fff;
      color: #fff;
      border: 1.5px solid #ff9800;
      border-radius: 18px;
      padding: 10px 18px;
      font-size: 1.01rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(255,152,0,0.08);
    }
    .chat-warning i {
      color: #ff9800;
      font-size: 1.2em;
    }
    .chat-message-row {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 8px;
    }
    .chat-bubble {
      max-width: 75vw;
      padding: 12px 18px;
      border-radius: 18px 18px 4px 18px;
      font-size: 1.08rem;
      line-height: 1.5;
      margin-bottom: 2px;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      position: relative;
      display: inline-block;
    }
    .chat-bubble.sent {
      background: linear-gradient(135deg, #1e4426 0%, #1b5e20 100%);
      color: #fff;
      align-self: flex-end;
      border-radius: 18px 18px 18px 4px;
      margin-left: auto;
      margin-right: 0;
    }
    .chat-bubble.received {
      background: #f7f9fa;
      color: #222;
      align-self: flex-start;
      border-radius: 18px 18px 4px 18px;
      margin-right: auto;
      margin-left: 0;
    }
    .chat-bubble .chat-time {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-top: 4px;
      text-align: right;
    }
    .chat-input-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: #181c1f;
      padding: 10px 8px 10px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.10);
    }
    .chat-input-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 20px;
      border: none;
      font-size: 1.08rem;
      background: #f7f9fa;
      color: #fff;
      outline: none;
    }
    .chat-input-bar button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      transition: background 0.2s;
    }
    .chat-input-bar button:active {
      background: #222;
    }
    @media (max-width: 600px) {
      .chat-header, .chat-product, .chat-input-bar { padding-left: 4px; padding-right: 4px; }
      .chat-bubble { max-width: 90vw; }
    }
  </style>
</head>
<body>
  <!-- Chat Header -->
  <div class="chat-header">
    <div class="avatar"><img src="assets/hijet-truck.jpg" alt="Avatar"></div>
    <div class="chat-info">
      <span class="chat-title">Kalculux Hub</span>
      <span class="chat-status">last seen: 9 hours ago</span>
    </div>
    <div class="chat-actions">
      <button class="chat-action-btn" title="Call" style="background:none;border:none;padding:6px 8px;cursor:pointer;font-size:1.25rem;color:#ff6b35;"><i class="fas fa-phone"></i></button>
      <button class="chat-action-btn" title="Video Call" style="background:none;border:none;padding:6px 8px;cursor:pointer;font-size:1.25rem;color:#ff6b35;"><i class="fas fa-video"></i></button>
      <button class="chat-action-btn" title="More" style="background:none;border:none;padding:6px 8px;cursor:pointer;font-size:1.25rem;color:#888;"><i class="fas fa-ellipsis-v"></i></button>
    </div>
  </div>
  <!-- Product Info Bar -->
  <div class="chat-product">
    <img src="assets/hijet-truck.jpg" alt="Product">
    <div class="product-info">
      <span class="product-title">Hiace Bus for Conventions</span>
      <span class="product-price">Contact for price</span>
    </div>
  </div>

  <!-- Messages Container with Context Menu -->
  <main class="messages-container" style="padding-bottom:0;">
    <div class="messages-content">
      <div class="messages-list" id="messagesList"></div>
    </div>
    <!-- Context Menu for Message Actions -->
    <div id="msgContextMenu" style="display:none;position:absolute;z-index:99999;background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.14);padding:8px 0;min-width:210px;overflow:hidden;">
      <button id="replyMsgBtn" style="width:100%;background:none;border:none;padding:12px 18px 12px 16px;text-align:left;font-size:1rem;color:#222;cursor:pointer;display:flex;align-items:center;gap:12px;">
        <i class="fas fa-reply" style="color:#4caf50;font-size:1.15rem;"></i>
        Reply
      </button>
      <hr style="margin:0 0 0 48px;border:none;border-left:1.5px solid #eee;height:22px;position:absolute;left:0;top:50px;width:100%;">
      <button id="copyMsgBtn" style="width:100%;background:none;border:none;padding:12px 18px 12px 16px;text-align:left;font-size:1rem;color:#222;cursor:pointer;display:flex;align-items:center;gap:12px;">
        <i class="fas fa-copy" style="color:#888;font-size:1.1rem;"></i>
        Copy
      </button>
      <button id="deleteMsgBtn" style="width:100%;background:#ffebee;border:none;padding:12px 18px 12px 16px;text-align:left;font-size:1rem;color:#d32f2f;cursor:pointer;display:flex;align-items:center;gap:12px;">
        <i class="fas fa-trash-alt" style="color:#d32f2f;font-size:1.1rem;"></i>
        Delete for me
      </button>
    </div>
  </main>
  
  <!-- Chat Input & Quick Replies Section -->
  <div class="chat-input-container-wrapper" style="position:fixed;left:0;right:0;bottom:0;z-index:12001;display:flex;flex-direction:column;max-width:100vw;box-shadow:0 -5px 15px rgba(0,0,0,0.04);">
    <!-- Quick Replies Bar -->
    <div class="chat-quick-replies" style="background:rgba(255,255,255,0.95); padding:8px 12px; display:flex; gap:8px; overflow-x:auto; white-space:nowrap; border-top:1px solid #f1f5f9; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); width:100%; box-sizing:border-box;">
      <button class="quick-reply-pill" data-msg="Is this vehicle still available?" style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:20px; padding:6px 14px; font-size:0.82rem; font-weight:500; color:#475569; cursor:pointer; transition:all 0.2s; white-space:nowrap; font-family:inherit; outline:none; box-shadow:0 1px 2px rgba(0,0,0,0.02);">Is it still available?</button>
      <button class="quick-reply-pill" data-msg="What is your final price for this vehicle?" style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:20px; padding:6px 14px; font-size:0.82rem; font-weight:500; color:#475569; cursor:pointer; transition:all 0.2s; white-space:nowrap; font-family:inherit; outline:none; box-shadow:0 1px 2px rgba(0,0,0,0.02);">Lowest price?</button>
      <button class="quick-reply-pill" data-msg="I would like to schedule a physical inspection and test drive." style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:20px; padding:6px 14px; font-size:0.82rem; font-weight:500; color:#475569; cursor:pointer; transition:all 0.2s; white-space:nowrap; font-family:inherit; outline:none; box-shadow:0 1px 2px rgba(0,0,0,0.02);">Schedule test drive</button>

  <script>
  // Dynamic parameters, persistence, and interactive auto-reply logic
  document.addEventListener('DOMContentLoaded', function() {
    const chatInput = document.querySelector('.chat-input-field');
    const sendBtn = document.querySelector('.send-btn');
    const voiceBtn = document.querySelector('.voice-btn');
    const emojiBtn = document.querySelector('.emoji-btn');
    const emojiMenu = document.querySelector('.emoji-menu');
    const emojiTabs = document.querySelectorAll('.emoji-tab');
    const emojiTabContents = document.querySelectorAll('.emoji-tab-content');
    const fileBtn = document.querySelector('.attach-btn');
    const fileInput = document.querySelector('.chat-file-input');
    const messagesList = document.getElementById('messagesList');
    let isRecording = false;

    // 1. URL Query Parameters Parsing
    const urlParams = new URLSearchParams(window.location.search);
    const sellerParam = urlParams.get('seller') || 'HephAuto Seller';
    const productParam = urlParams.get('product') || 'Hiace Bus for Conventions';
    const priceParam = urlParams.get('price') || 'Contact for price';
    const imageParam = urlParams.get('image') || 'assets/hijet-truck.jpg';
    const messageParam = urlParams.get('message');

    // Update UI elements based on params
    const chatTitleEl = document.querySelector('.chat-header .chat-title');
    if (chatTitleEl) chatTitleEl.textContent = sellerParam;

    const chatStatusEl = document.querySelector('.chat-header .chat-status');
    if (chatStatusEl) chatStatusEl.textContent = 'Online';

    const headerAvatarImg = document.querySelector('.chat-header .avatar img');
    if (headerAvatarImg) headerAvatarImg.src = imageParam;

    const productBarImg = document.querySelector('.chat-product img');
    if (productBarImg) productBarImg.src = imageParam;

    const productTitleEl = document.querySelector('.chat-product .product-title');
    if (productTitleEl) productTitleEl.textContent = productParam;

    const productPriceEl = document.querySelector('.chat-product .product-price');
    if (productPriceEl) productPriceEl.textContent = priceParam;

    // Unique chatId for storage
    const chatId = `heph_chat_${sellerParam.replace(/\s+/g, '_')}_${productParam.replace(/\s+/g, '_')}`;

    // Context menu elements
    const msgContextMenu = document.getElementById('msgContextMenu');
    let contextTargetMsg = null;
    
    // Show context menu on right-click or long-press
    messagesList.addEventListener('contextmenu', function(e) {
      const bubble = e.target.closest('.wa-bubble');
      if (bubble) {
        e.preventDefault();
        contextTargetMsg = bubble;
        showMsgContextMenu(e.clientX, e.clientY);
      }
    });
    
    let longPressTimer = null;
    messagesList.addEventListener('touchstart', function(e) {
      const bubble = e.target.closest('.wa-bubble');
      if (bubble) {
        longPressTimer = setTimeout(() => {
          contextTargetMsg = bubble;
          const touch = e.touches[0];
          showMsgContextMenu(touch.clientX, touch.clientY);
        }, 500);
      }
    });
    messagesList.addEventListener('touchend', function() {
      clearTimeout(longPressTimer);
    });

    function showMsgContextMenu(x, y) {
      if (contextTargetMsg) {
        const bubbleRect = contextTargetMsg.getBoundingClientRect();
        const menuRect = msgContextMenu.getBoundingClientRect();
        let left, top;
        if (window.innerWidth > 600) {
          left = bubbleRect.left - menuRect.width - 12;
          if (left < 8) left = 8;
          top = bubbleRect.bottom + 8;
          if (top + menuRect.height > window.innerHeight) {
            top = window.innerHeight - menuRect.height - 8;
          }
        } else {
          left = bubbleRect.left + (bubbleRect.width / 2) - (menuRect.width / 2);
          if (left < 8) left = 8;
          if (left + menuRect.width > window.innerWidth - 8) left = window.innerWidth - menuRect.width - 8;
          top = bubbleRect.bottom + 8;
          if (top + menuRect.height > window.innerHeight) {
            top = window.innerHeight - menuRect.height - 8;
          }
        }
        msgContextMenu.style.display = 'block';
        msgContextMenu.style.left = left + 'px';
        msgContextMenu.style.top = top + 'px';
      }
    }

    document.addEventListener('click', function(e) {
      if (msgContextMenu && !msgContextMenu.contains(e.target)) {
        msgContextMenu.style.display = 'none';
      }
    });

    // Copy message text
    document.getElementById('copyMsgBtn').addEventListener('click', function() {
      if (contextTargetMsg) {
        const text = contextTargetMsg.querySelector('.wa-bubble-content')?.innerText || '';
        if (text) {
          navigator.clipboard.writeText(text);
        }
        msgContextMenu.style.display = 'none';
      }
    });

    // Delete message
    document.getElementById('deleteMsgBtn').addEventListener('click', function() {
      if (contextTargetMsg) {
        const messageText = contextTargetMsg.querySelector('.wa-bubble-content')?.innerText || '';
        contextTargetMsg.remove();
        msgContextMenu.style.display = 'none';
        
        // Remove from localStorage as well
        let history = JSON.parse(localStorage.getItem(chatId) || '[]');
        history = history.filter(m => m.text !== messageText);
        localStorage.setItem(chatId, JSON.stringify(history));

        // Update conversations last message if needed
        if (history.length > 0) {
          updateConversationsList(history[history.length - 1].text);
        } else {
          // Remove conversation entirely if no messages remain
          let convs = JSON.parse(localStorage.getItem('heph_conversations') || '[]');
          convs = convs.filter(c => c.id !== `${sellerParam}-${productParam}`);
          localStorage.setItem('heph_conversations', JSON.stringify(convs));
        }
      }
    });

    // Toggle send/voice icon based on input
    function toggleSendVoice() {
      if (chatInput.value.trim().length > 0) {
        sendBtn.style.display = 'flex';
        voiceBtn.style.display = 'none';
      } else {
        sendBtn.style.display = 'none';
        voiceBtn.style.display = 'flex';
      }
    }
    chatInput.addEventListener('input', toggleSendVoice);
    toggleSendVoice();

    // Helper: create message bubble (supports sent/received)
    function appendMessage({text, sender, file, fileType, isImage, isVideo, time}) {
      const msg = document.createElement('div');
      msg.className = 'wa-bubble ' + (sender === 'buyer' ? 'sent' : 'received');
      let html = '';
      if (text) {
        html += `<span class="wa-bubble-content">${text
          .replace(/\[GIF\]/g, '<img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif" alt="gif" style="width:60px;height:60px;vertical-align:middle;border-radius:8px;">')
          .replace(/\[Sticker\]/g, '<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="sticker" style="width:40px;height:40px;vertical-align:middle;border-radius:8px;">')}</span>`;
      }
      if (file) {
        if (isImage) {
          html += `<img src="${file}" alt="image" style="max-width:120px;max-height:120px;display:block;margin:8px 0;border-radius:10px;">`;
        } else if (isVideo) {
          html += `<video src="${file}" controls style="max-width:180px;max-height:120px;display:block;margin:8px 0;border-radius:10px;"></video>`;
        } else {
          html += `<a href="${file}" target="_blank" style="display:block;margin:8px 0;color:inherit;text-decoration:underline;">Download ${fileType || 'file'}</a>`;
        }
      }
      html += `<span class="wa-bubble-time">${time}</span>`;
      msg.innerHTML = html;
      messagesList.appendChild(msg);
      messagesList.style.display = 'flex';
      messagesList.scrollTop = messagesList.scrollHeight;
    }

    // Add keyframes for typing bouncing dots
    const typingStyle = document.createElement('style');
    typingStyle.textContent = `
      @keyframes hephTypingBounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
      .heph-typing-dot {
        width: 8px;
        height: 8px;
        background-color: #64748b;
        border-radius: 50%;
        display: inline-block;
        animation: hephTypingBounce 1.4s infinite ease-in-out both;
      }
    `;
    document.head.appendChild(typingStyle);

    // Load message history from localStorage
    // Mark as read immediately on active page load
    let activeConvs = JSON.parse(localStorage.getItem('heph_conversations') || '[]');
    activeConvs = activeConvs.map(c => {
      if (c.id === `${sellerParam}-${productParam}`) {
        c.unread = false;
      }
      return c;
    });
    localStorage.setItem('heph_conversations', JSON.stringify(activeConvs));

    function loadChatHistory() {
      messagesList.innerHTML = '';
      let history = JSON.parse(localStorage.getItem(chatId) || '[]');
      
      // If history is empty and messageParam is provided, initialize
      if (history.length === 0 && messageParam) {
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        // 1. Initial buyer message
        history.push({ text: messageParam, sender: 'buyer', time: timeStr });
        appendMessage({ text: messageParam, sender: 'buyer', time: timeStr });
        
        // 2. Simulated typing indicator for seller
        if (chatStatusEl) chatStatusEl.textContent = 'typing...';
        const typingBubble = document.createElement('div');
        typingBubble.className = 'wa-bubble received heph-typing-bubble';
        typingBubble.style.cssText = 'padding: 12px 18px; border-radius: 18px 18px 4px 18px; max-width: 75vw; display: inline-flex; align-items: center; gap: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); background: #f7f9fa; align-self: flex-start; margin-right: auto; margin-left: 0;';
        typingBubble.innerHTML = `
          <span class="heph-typing-dot" style="animation-delay: 0s;"></span>
          <span class="heph-typing-dot" style="animation-delay: 0.2s;"></span>
          <span class="heph-typing-dot" style="animation-delay: 0.4s;"></span>
        `;
        messagesList.appendChild(typingBubble);
        messagesList.scrollTop = messagesList.scrollHeight;

        const sellerMsgText = `Hello! Thank you for reaching out about the ${productParam}. Yes, it is still available and the price is slightly negotiable for serious buyers. Would you like to schedule a test drive or inspect the vehicle in person?`;
        
        setTimeout(() => {
          typingBubble.remove();
          if (chatStatusEl) chatStatusEl.textContent = 'Online';
          
          const replyTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          history.push({ text: sellerMsgText, sender: 'seller', time: replyTime });
          localStorage.setItem(chatId, JSON.stringify(history));
          appendMessage({ text: sellerMsgText, sender: 'seller', time: replyTime });
          updateConversationsList(sellerMsgText, false); // Viewer is active, keep unread = false
        }, 1500);

        localStorage.setItem(chatId, JSON.stringify(history));
        updateConversationsList(messageParam, false);
      } else {
        // Render existing history
        history.forEach(msg => {
          appendMessage(msg);
        });
      }
    }

    // Helper to update the master conversations list in localStorage
    function updateConversationsList(lastMsgText, isUnread) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      const conversation = {
        id: `${sellerParam}-${productParam}`,
        sellerName: sellerParam,
        vehicleName: productParam,
        price: priceParam,
        image: imageParam,
        lastMessage: lastMsgText,
        time: timeStr,
        unread: isUnread || false
      };

      let conversations = JSON.parse(localStorage.getItem('heph_conversations') || '[]');
      conversations = conversations.filter(c => c.id !== conversation.id);
      conversations.unshift(conversation);
      localStorage.setItem('heph_conversations', JSON.stringify(conversations));
    }

    // Save message to history
    function saveMessage(text, sender, file, fileType, isImage, isVideo) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const msg = { text, sender, file, fileType, isImage, isVideo, time: timeStr };
      
      let history = JSON.parse(localStorage.getItem(chatId) || '[]');
      history.push(msg);
      localStorage.setItem(chatId, JSON.stringify(history));
      
      // If buyer is sending, mark as read. If seller auto-replies, mark as unread (true)
      const isUnread = (sender === 'seller');
      updateConversationsList(text || '[Attachment]', isUnread);
    }

    // Send text message
    function sendTextMessage() {
      const val = chatInput.value.trim();
      if (!val) return;
      
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      appendMessage({ text: val, sender: 'buyer', time: timeStr });
      saveMessage(val, 'buyer', null, null, false, false);
      chatInput.value = '';
      toggleSendVoice();
      
      // Simulate seller reply
      triggerSellerAutoReply(val);
    }

    // Send file message
    function sendFileMessage(fileObj) {
      const file = fileObj;
      const reader = new FileReader();
      reader.onload = function(e) {
        const url = e.target.result;
        let isImage = file.type.startsWith('image/');
        let isVideo = file.type.startsWith('video/');
        const now = new Date();
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        appendMessage({ file: url, fileType: file.type, isImage, isVideo, sender: 'buyer', time: timeStr });
        saveMessage('[Attachment]', 'buyer', url, file.type, isImage, isVideo);
        
        triggerSellerAutoReply('[Sent an attachment]');
      };
      reader.readAsDataURL(file);
    }

    const autoReplies = [
      "I appreciate your query! Our showroom is open Monday through Saturday from 8:00 AM to 6:00 PM. Would you like to set up a viewing appointment?",
      "That is a great choice! The vehicle has a clean title, undergoes strict quality inspection, and has no hidden issues. Let me know if you would like me to share the inspection report.",
      "Certainly! We also have flexible auto financing plans and trade-in offers. You can check the Loan Calculator on the vehicle details page or tell me your trade-in details here.",
      "Thank you! One of our service managers will also contact you on your registered phone number shortly to discuss the paperwork and discounts."
    ];
    let replyIndex = 0;

    function triggerSellerAutoReply(buyerText) {
      // 1. Set status to typing...
      if (chatStatusEl) chatStatusEl.textContent = 'typing...';
      
      // 2. Render typing indicator bubble
      const typingBubble = document.createElement('div');
      typingBubble.className = 'wa-bubble received heph-typing-bubble';
      typingBubble.style.cssText = 'padding: 12px 18px; border-radius: 18px 18px 4px 18px; max-width: 75vw; display: inline-flex; align-items: center; gap: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); background: #f7f9fa; align-self: flex-start; margin-right: auto; margin-left: 0;';
      typingBubble.innerHTML = `
        <span class="heph-typing-dot" style="animation-delay: 0s;"></span>
        <span class="heph-typing-dot" style="animation-delay: 0.2s;"></span>
        <span class="heph-typing-dot" style="animation-delay: 0.4s;"></span>
      `;
      messagesList.appendChild(typingBubble);
      messagesList.scrollTop = messagesList.scrollHeight;

      setTimeout(() => {
        // Remove typing indicator bubble
        typingBubble.remove();
        
        // Restore status to Online
        if (chatStatusEl) chatStatusEl.textContent = 'Online';

        const replyText = autoReplies[replyIndex % autoReplies.length];
        replyIndex++;
        const replyTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        appendMessage({ text: replyText, sender: 'seller', time: replyTime });
        saveMessage(replyText, 'seller', null, null, false, false);
      }, 1500);
    }

    // Initialize chat list
    loadChatHistory();

    // Quick reply pills event listeners
    document.querySelectorAll('.quick-reply-pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        const msgText = this.getAttribute('data-msg');
        if (msgText) {
          chatInput.value = msgText;
          sendTextMessage();
        }
      });
    });

    // Send on button click
    sendBtn.addEventListener('click', sendTextMessage);
    
    // Send on Enter key
    chatInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendTextMessage();
      }
    });

    // File attach
    fileBtn.addEventListener('click', function() {
      fileInput.click();
    });
    fileInput.addEventListener('change', function() {
      if (fileInput.files.length > 0) {
        sendFileMessage(fileInput.files[0]);
        fileInput.value = '';
      }
    });

    // Emoji/GIF/Sticker event listeners
    emojiBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      emojiMenu.style.display = emojiMenu.style.display === 'block' ? 'none' : 'block';
    });
    
    document.addEventListener('click', function(e) {
      if (emojiMenu && !emojiMenu.contains(e.target) && e.target !== emojiBtn) {
        emojiMenu.style.display = 'none';
      }
    });
    
    emojiTabs.forEach(tab => {
      tab.addEventListener('click', function() {
        emojiTabs.forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        emojiTabContents.forEach(content => {
          content.style.display = 'none';
        });
        const tabName = this.dataset.tab;
        document.querySelector('.' + tabName + '-content').style.display = 'block';
      });
    });

    emojiMenu.querySelectorAll('.emoji-item').forEach(item => {
      item.addEventListener('click', function() {
        chatInput.value += this.textContent;
        chatInput.focus();
        toggleSendVoice();
      });
    });

    emojiMenu.querySelectorAll('.gif-item').forEach(item => {
      item.addEventListener('click', function() {
        chatInput.value += ' [GIF] ';
        chatInput.focus();
        toggleSendVoice();
      });
    });

    emojiMenu.querySelectorAll('.sticker-item').forEach(item => {
      item.addEventListener('click', function() {
        chatInput.value += ' [Sticker] ';
        chatInput.focus();
        toggleSendVoice();
      });
    });

    voiceBtn.addEventListener('click', function() {
      if (!isRecording) {
        isRecording = true;
        voiceBtn.style.color = '#ff6b35';
        voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
        alert('Voice recording started (demo only)');
      } else {
        isRecording = false;
        voiceBtn.style.color = '#888';
        voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        alert('Voice recording stopped (demo only)');
      }
    });
  });
  </script>
  
</body>
</html>
