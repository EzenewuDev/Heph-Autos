<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HephAuto</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   <!-- Favicon for browser tab and localhost section -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/hephauto.png">
  <link rel="icon" type="image/png" sizes="48x48" href="assets/hephauto.png">
  <link rel="shortcut icon" type="image/png" href="assets/hephauto.png">
</head>
<body>
  <header class="login-page-header">
    <div class="logo">
      <a href="Heph.html">
        <img src="assets/hephauto.png" alt="HephAuto Logo" class="logo-image">
      </a>
    </div>
    <div class="header-actions">
      <a href="login.html"><button class="header-login-btn">Log In</button></a>
      <a href="signup.html"><button class="header-signup-btn">Sign Up</button></a>
    </div>
  </header>

  <main>
    <form class="my-form" id="loginForm">
      <div class="login-welcome-row">
        <div class="login-welcome-title">
          <span>Welcome Back</span>
        </div>
        <div class="login-welcome-subtitle">
          Sign in to your HephAuto account to continue.
        </div>
      </div>
      <div class="my-form_fields">
        <div class="text-field">
          <label for="email">Email or Username</label>
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="email" placeholder="Enter your email or username" required>
        </div>
        <div class="text-field" style="position:relative;">
          <label for="password">Password</label>
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="Enter your password" required>
          <i class="fas fa-eye password-toggle-icon" id="toggle-password"></i>
        </div>
      </div>
      <div class="my-form_actions">
        <label class="remember-me">
          <input type="checkbox" id="remember-me">
          <span class="checkmark"></span>
          Remember me
        </label>
        <a href="#" class="forgot-password">Forgot Password?</a>
      </div>
      <button type="submit" class="my-form_button login-submit-btn">
        <span class="btn-text">Sign In</span>
        <span class="btn-loading" style="display: none;">
          <i class="fas fa-spinner fa-spin"></i> Signing In...
        </span>
      </button>
      <!-- Social sign up buttons (moved here) -->
      <div class="divider-row">
        <hr>
        <span>or sign in with</span>
        <hr>
      </div>
      <div class="social-signup-row">
        <button class="social-btn google-btn" id="googleLoginBtn" type="button">
          <i class="fab fa-google"></i> Sign in with Google
        </button>
        <button class="social-btn apple-btn" id="appleLoginBtn" type="button">
          <i class="fab fa-apple"></i> Sign in with Apple
        </button>
      </div>
      <div class="form-footer" style="margin-top:1.5rem;text-align:center;">
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
      </div>
      <!-- Demo Accounts Info -->
      <!-- <div class="demo-accounts" style="margin-top:2rem;text-align:center;">
        <h3>Demo Accounts</h3>
        <div class="demo-account">
          <strong>Admin:</strong> admin@hephauto.com / admin123
        </div>
        <div class="demo-account">
          <strong>User:</strong> user@example.com / user123
        </div>
      </div> -->
    </form>
  </main>

  <!-- Floating Chat Icon -->
  <div class="floating-chat" id="floatingChat">
    <div class="chat-icon" id="chatIcon">
      <i class="fas fa-comments"></i>
      <span class="chat-badge">1</span>
    </div>
    <!-- Chat Interface -->
    <div class="chat-interface" id="chatInterface">
      <div class="chat-header">
        <div class="chat-user-info">
          <img src="assets/profile.png" alt="Seller" class="chat-avatar">
          <div>
            <h4>HephAuto Seller</h4>
            <span class="online-status">Online</span>
          </div>
        </div>
        <button class="close-chat" id="closeChat">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="message seller-message">
          <div class="message-content">
            <p>Hi! Welcome to HephAuto. How can I help you today?</p>
            <span class="message-time">2:30 PM</span>
          </div>
        </div>
      </div>
      <div class="chat-input">
        <input type="text" id="messageInput" placeholder="Type your message...">
        <button id="sendMessage">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
  <script>
    // Google OAuth Redirect
    function redirectToGoogleOAuth() {
      const clientId = 'YOUR_GOOGLE_CLIENT_ID'; // TODO: Replace with your real client ID
      const redirectUri = encodeURIComponent('YOUR_REDIRECT_URI'); // TODO: Replace with your real redirect URI
      const scope = encodeURIComponent('profile email');
      const state = encodeURIComponent('hephauto-login');
      const url =
        `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${clientId}` +
        `&redirect_uri=${redirectUri}` +
        `&response_type=code` +
        `&scope=${scope}` +
        `&state=${state}` +
        `&access_type=online` +
        `&prompt=select_account`;
      window.location.href = url;
    }
    // Apple OAuth Redirect
    function redirectToAppleOAuth() {
      const clientId = 'YOUR_APPLE_CLIENT_ID'; // TODO: Replace with your real Apple client ID
      const redirectUri = encodeURIComponent('YOUR_REDIRECT_URI'); // TODO: Replace with your real redirect URI
      const scope = encodeURIComponent('name email');
      const state = encodeURIComponent('hephauto-login');
      const url =
        `https://appleid.apple.com/auth/authorize?` +
        `client_id=${clientId}` +
        `&redirect_uri=${redirectUri}` +
        `&response_type=code` +
        `&scope=${scope}` +
        `&state=${state}` +
        `&response_mode=fragment`;
      window.location.href = url;
    }
    document.getElementById('googleLoginBtn').addEventListener('click', redirectToGoogleOAuth);
    document.getElementById('appleLoginBtn').addEventListener('click', redirectToAppleOAuth);
  </script>
</body>
</html>
