<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - HephAuto</title>
  <link rel="stylesheet" href="Heph.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   <!-- Favicon for browser tab and localhost section -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/hephauto.png">
  <link rel="icon" type="image/png" sizes="48x48" href="assets/hephauto.png">
  <link rel="shortcut icon" type="image/png" href="assets/hephauto.png">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8f9fa;
      margin: 0;
    }
    .thank-you-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      padding: 40px 30px;
      text-align: center;
      max-width: 400px;
    }
    .thank-you-icon {
      font-size: 48px;
      color: #4CAF50;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #222;
    }
    p {
      color: #555;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    a.cta-btn {
      display: inline-block;
      background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
      color: #fff;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    a.cta-btn:hover {
      background: linear-gradient(135deg, #f7931e 0%, #ff6b35 100%);
    }
  </style>
</head>
<body>
  <div class="thank-you-container">
    <div class="thank-you-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.<br>We appreciate you contacting HephAuto and will respond as soon as possible.</p>
    <a href="Heph.html" class="cta-btn">Back to Home</a>
  </div>
</body>
</html>
